<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #111827;
            --canvas-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --modal-bg: rgba(17, 24, 39, 0.95);
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .header { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .score-board { font-size: 20px; font-weight: bold; }
        .user-info { font-size: 14px; color: #9ca3af; }
        
        .controls { display: flex; gap: 8px; }
        button { background-color: var(--btn-bg); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: var(--btn-hover); }

        canvas { 
            background-color: var(--canvas-bg); 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 95vw;
            max-width: 400px;
            height: 95vw;
            max-height: 400px;
            touch-action: none; 
        }
