<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #111827;
            --canvas-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --modal-bg: rgba(17, 24, 39, 0.95);
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .score-board { font-size: 20px; font-weight: bold; }
        .user-info { font-size: 14px; color: #9ca3af; }
        
        .controls { display: flex; gap: 8px; }
        button { background-color: var(--btn-bg); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: var(--btn-hover); }

        canvas { background-color: var(--canvas-bg); border: 2px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background-color: var(--modal-bg); padding: 30px; border-radius: 10px; width: 90%; max-width: 350px; border: 1px solid var(--border-color); }
        .modal h2 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; margin-bottom: 5px; color: #9ca3af;}
        .input-group input, select { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--canvas-bg); color: white; }
        
        .auth-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .auth-buttons button { flex: 1; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 5px; min-height: 15px; }

        .leaderboard-list { list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 14px;}
        .leaderboard-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .rank-user { display: flex; gap: 10px; }
        .score-mode { text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="user-info" id="displayUsername">Not logged in</div>
            <div class="score-board">Score: <span id="score">0</span></div>
        </div>
        <div class="controls">
            <button onclick="openModal('settingsModal')">⚙️</button>
            <button onclick="openModal('leaderboardModal')">🏆 Leaderboard</button>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="authModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2>Player Login</h2>
            <p style="font-size: 12px; color: #9ca3af;">Create a username and password to track your score.</p>
            <div class="input-group">
                <label>Username (Case Sensitive)</label>
                <input type="text" id="usernameInput" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password">
            </div>
            <div id="authError" class="error-msg"></div>
            <div class="auth-buttons">
                <button onclick="login()">Login</button>
                <button onclick="register()" style="background-color: #10b981;">Register</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Difficulty</label>
                <select id="difficultySelect" onchange="updateSettings()">
                    <option value="easy">Easy (Slower, No Mines)</option>
                    <option value="hard">Hard (Fast, Neon Mines!)</option>
                </select>
            </div>
            <button style="width: 100%; margin-top: 10px;" onclick="closeModal('settingsModal')">Done</button>
            <button style="width: 100%; margin-top: 10px; background-color: #ef4444;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <h2>Top 5 Leaderboard</h2>
            <ul id="leaderboardList" class="leaderboard-list"></ul>
            <button style="width: 100%;" onclick="closeModal('leaderboardModal')">Close</button>
        </div>
    </div>

    <script>
        // --- MOCK AUTHENTICATION SYSTEM (FRONTEND ONLY) ---
        let currentUser = null;

        function getDB() {
            return JSON.parse(localStorage.getItem('snakeUsersDB')) || {};
        }
        function saveDB(db) {
            localStorage.setItem('snakeUsersDB', JSON.stringify(db));
        }

        function register() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('authError');
            
            if (!user || !pass) return errorDiv.innerText = "Fields cannot be empty!";
            
            let db = getDB();
            if (db[user]) return errorDiv.innerText = "Username already exists!";
            
            db[user] = pass; // Storing plain text! (Insecure in real life)
            saveDB(db);
            
            loginSuccess(user);
        }

        function login() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('authError');
            
            let db = getDB();
            if (!db[user]) return errorDiv.innerText = "Username not found!";
            if (db[user] !== pass) return errorDiv.innerText = "Incorrect password!";
            
            loginSuccess(user);
        }

        function loginSuccess(user) {
            currentUser = user;
            document.getElementById('displayUsername').innerText = `Player: ${user}`;
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
            document.getElementById('authError').innerText = '';
            restartGame({type: 'click'}); // Start game
        }

        function logout() {
            currentUser = null;
            document.getElementById('displayUsername').innerText = "Not logged in";
            closeModal('settingsModal');
            document.getElementById('authModal').style.display = 'flex';
            isPaused = true;
        }

        // --- SMOOTH GAME ENGINE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const size = 15; // Width/Height of snake and food
        let isPaused = true;
        let animationId;
        
        let score = 0;
        let difficulty = "easy";
        let baseSpeed = 2.5; // Pixels per frame
        
        let snake = { x: 200, y: 200, vx: baseSpeed, vy: 0 };
        let pathHistory = []; 
        let snakeLength = 15; // How many history nodes to trail
        let spacing = 6; // Spacing between drawn segments

        let food = {x: 0, y: 0};
        let mines = [];
        let changingDirection = false;

        document.addEventListener("keydown", changeDirection);

        function gameLoop() {
            if (isPaused || !currentUser) return;

            updatePhysics();
            
            if (hasGameEnded()) {
                saveLeaderboard(score);
                drawGameOver();
                return;
            }

            renderGraphics();
            animationId = requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // Move Head smoothly
            snake.x += snake.vx;
            snake.y += snake.vy;

            // Save history for body to follow
            pathHistory.unshift({x: snake.x, y: snake.y});
            
            // Remove old history
            if (pathHistory.length > snakeLength * spacing + 1) {
                pathHistory.pop();
            }

            // Check Food Collision (Distance based instead of grid)
            const distToFood = Math.hypot(snake.x - food.x, snake.y - food.y);
            if (distToFood < size) {
                score += 10;
                scoreElement.innerHTML = score;
                snakeLength += 2; // Grow
                generateFood();
                if (difficulty === 'hard') generateMine();
            }

            changingDirection = false;
        }

        function renderGraphics() {
            // Clear canvas
            ctx.fillStyle = '#1f2937';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Mines (Neon Black/Red)
            mines.forEach(mine => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0044';
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, size/1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Red glowing core
                ctx.shadowBlur = 0;
                ctx.fillStyle = (Date.now() % 800 < 400) ? '#ff0044' : '#4a0011';
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, size/3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0; // Reset shadow

            // Draw Food
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.arc(food.x, food.y, size/1.5, 0, Math.PI * 2);
            ctx.fill();

            // Draw Snake (Smooth following)
            for (let i = 0; i < snakeLength; i++) {
                let index = i * spacing;
                if (index >= pathHistory.length) break;
                
                let pos = pathHistory[index];
                let lightness = Math.max(30, 60 - (i * 1.5));
                
                ctx.fillStyle = `hsl(210, 80%, ${lightness}%)`;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size/1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- GAME LOGIC ---

        function generateFood() {
            food.x = Math.random() * (canvas.width - size*2) + size;
            food.y = Math.random() * (canvas.height - size*2) + size;
        }

        function generateMine() {
            let mineX = Math.random() * (canvas.width - size*2) + size;
            let mineY = Math.random() * (canvas.height - size*2) + size;
            // Prevent spawning on head
            if (Math.hypot(mineX - snake.x, mineY - snake.y) < 50) return generateMine();
            mines.push({x: mineX, y: mineY});
        }

        function changeDirection(event) {
            if (changingDirection || !currentUser) return;
            const key = event.keyCode;
            const up = snake.vy < 0, down = snake.vy > 0, right = snake.vx > 0, left = snake.vx < 0;
            const spd = (difficulty === 'hard') ? 3.5 : 2.5;

            if ((key === 37 || key === 65) && !right) { snake.vx = -spd; snake.vy = 0; changingDirection = true; }
            if ((key === 38 || key === 87) && !down) { snake.vx = 0; snake.vy = -spd; changingDirection = true; }
            if ((key === 39 || key === 68) && !left) { snake.vx = spd; snake.vy = 0; changingDirection = true; }
            if ((key === 40 || key === 83) && !up) { snake.vx = 0; snake.vy = spd; changingDirection = true; }
        }

        function hasGameEnded() {
            // Wall
            if (snake.x < 0 || snake.x > canvas.width || snake.y < 0 || snake.y > canvas.height) return true;
            // Mines
            for (let m of mines) {
                if (Math.hypot(snake.x - m.x, snake.y - m.y) < size) return true;
            }
            // Self (Only check segments far enough down the history string)
            for (let i = 15; i < snakeLength; i++) {
                let index = i * spacing;
                if (index < pathHistory.length) {
                    if (Math.hypot(snake.x - pathHistory[index].x, snake.y - pathHistory[index].y) < size / 1.5) return true;
                }
            }
            return false;
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "16px Arial";
            ctx.fillText("Click to Restart", canvas.width / 2, canvas.height / 2 + 25);
            canvas.addEventListener('click', restartGame);
        }

        function restartGame(e) {
            if (!currentUser) return;
            canvas.removeEventListener('click', restartGame);
            cancelAnimationFrame(animationId);
            
            score = 0; scoreElement.innerHTML = score;
            const spd = (difficulty === 'hard') ? 3.5 : 2.5;
            snake = { x: 200, y: 200, vx: spd, vy: 0 };
            pathHistory = [];
            snakeLength = 15;
            mines = [];
            generateFood();
            
            isPaused = false;
            requestAnimationFrame(gameLoop);
        }

        // --- UI & DATA ---
        function openModal(id) { isPaused = true; document.getElementById(id).style.display = "flex"; if(id === 'leaderboardModal') loadLeaderboardUI(); }
        function closeModal(id) { document.getElementById(id).style.display = "none"; if(currentUser && !hasGameEnded()) { isPaused = false; requestAnimationFrame(gameLoop); } }

        function updateSettings() {
            difficulty = document.getElementById('difficultySelect').value;
            let spd = (difficulty === 'hard') ? 3.5 : 2.5;
            if (snake.vx !== 0) snake.vx = (snake.vx > 0) ? spd : -spd;
            if (snake.vy !== 0) snake.vy = (snake.vy > 0) ? spd : -spd;
            if (difficulty === 'easy') mines = [];
        }

        function saveLeaderboard(currentScore) {
            if (currentScore === 0 || !currentUser) return;
            let scores = JSON.parse(localStorage.getItem('snakeLeaderboard')) || [];
            scores.push({ user: currentUser, score: currentScore, mode: difficulty.toUpperCase() });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('snakeLeaderboard', JSON.stringify(scores.slice(0, 5)));
        }

        function loadLeaderboardUI() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "";
            let scores = JSON.parse(localStorage.getItem('snakeLeaderboard')) || [];
            if(scores.length === 0) return list.innerHTML = "<li>No scores yet!</li>";

            scores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<div class="rank-user"><strong>#${index + 1}</strong> <span>${entry.user}</span></div>
                                <div class="score-mode"><strong>${entry.score} pts</strong> <br><span style="font-size: 10px; color:#9ca3af;">${entry.mode}</span></div>`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
