<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            background-color: #34495e;
            border: 4px solid #bdc3c7;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .score-board {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .instructions {
            margin-top: 15px;
            color: #95a5a6;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="instructions">Use Arrow Keys to move</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Game settings
        const gridSize = 20;
        let score = 0;
        let changingDirection = false;
        let dx = gridSize; // Velocity X
        let dy = 0;        // Velocity Y

        // Initial snake (starts with 3 segments)
        let snake = [
            {x: 200, y: 200},
            {x: 180, y: 200},
            {x: 160, y: 200}
        ];

        // Food coordinates
        let foodX;
        let foodY;

        // Start game
        main();
        generateFood();

        // Listen for keyboard presses
        document.addEventListener("keydown", changeDirection);

        /**
         * Main game loop
         */
        function main() {
            if (hasGameEnded()) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillText("Refresh to restart", canvas.width / 2, (canvas.height / 2) + 30);
                return;
            }

            changingDirection = false;
            
            // Adjust the timeout value to change the game speed
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        /**
         * Clears the canvas for the next frame
         */
        function clearCanvas() {
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        /**
         * Draws the snake on the canvas
         */
        function drawSnake() {
            snake.forEach((part, index) => {
                // Make the head a slightly different color
                ctx.fillStyle = index === 0 ? '#27ae60' : '#2ecc71';
                ctx.strokeStyle = '#2c3e50';
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        /**
         * Moves the snake forward
         */
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // Add new head

            const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
            if (didEatFood) {
                score += 10;
                scoreElement.innerHTML = score;
                generateFood();
            } else {
                snake.pop(); // Remove tail if no food eaten
            }
        }

        /**
         * Draws the food on the canvas
         */
        function drawFood() {
            ctx.fillStyle = '#e74c3c';
            ctx.strokeStyle = '#c0392b';
            ctx.fillRect(foodX, foodY, gridSize, gridSize);
            ctx.strokeRect(foodX, foodY, gridSize, gridSize);
        }

        /**
         * Generates a random coordinate for the food
         */
        function randomFood(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        function generateFood() {
            foodX = randomFood(0, canvas.width - gridSize);
            foodY = randomFood(0, canvas.height - gridSize);
            
            // Prevent food from spawning on the snake
            snake.forEach(function has_snake_eaten_food(part) {
                const has_eaten = part.x == foodX && part.y == foodY;
                if (has_eaten) generateFood();
            });
        }

        /**
         * Handles user input and prevents reversing
         */
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            if (changingDirection) return;
            
            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        /**
         * Checks for wall collisions or self-collisions
         */
        function hasGameEnded() {
            // Check self collision (start at 4 since head can't touch first 3 body parts)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Check wall collision
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }
    </script>
</body>
</html>
