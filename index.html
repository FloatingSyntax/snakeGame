<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #111827;
            --canvas-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --modal-bg: rgba(17, 24, 39, 0.95);
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .score-board { font-size: 20px; font-weight: bold; }
        .user-info { font-size: 14px; color: #9ca3af; }
        
        .controls { display: flex; gap: 8px; }
        button { background-color: var(--btn-bg); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: var(--btn-hover); }

        canvas { background-color: var(--canvas-bg); border: 2px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background-color: var(--modal-bg); padding: 30px; border-radius: 10px; width: 90%; max-width: 350px; border: 1px solid var(--border-color); }
        .modal h2 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; margin-bottom: 5px; color: #9ca3af;}
        .input-group input, select { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--canvas-bg); color: white; }
        
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 5px; min-height: 15px; }

        .leaderboard-list { list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 14px;}
        .leaderboard-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .rank-user { display: flex; gap: 10px; }
        .score-mode { text-align: right; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="header">
        <div>
            <div class="user-info" id="displayUsername">Not playing</div>
            <div class="score-board">Score: <span id="score">0</span></div>
        </div>
        <div class="controls">
            <button onclick="openModal('settingsModal')">⚙️</button>
            <button onclick="openModal('leaderboardModal')">🏆 Leaderboard</button>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Welcome</h2>
            <p style="font-size: 12px; color: #9ca3af;">Enter your player name to join the leaderboard.</p>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="15">
            </div>
            <div id="nameError" class="error-msg"></div>
            <button style="width: 100%; margin-top: 10px;" onclick="saveName()">Start Playing</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Difficulty</label>
                <select id="difficultySelect" onchange="updateSettings()">
                    <option value="easy">Easy (Slower, No Mines)</option>
                    <option value="hard">Hard (Fast, Neon Mines!)</option>
                </select>
            </div>
            <button style="width: 100%; margin-top: 10px;" onclick="closeModal('settingsModal')">Done</button>
            <button style="width: 100%; margin-top: 10px; background-color: #ef4444;" onclick="changeName()">Change Name</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <h2>Top 5 Global Scores</h2>
            <ul id="leaderboardList" class="leaderboard-list"></ul>
            <button style="width: 100%;" onclick="closeModal('leaderboardModal')">Close</button>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIGURATION ---
        // ⚠️ PASTE YOUR KEYS HERE AGAIN! ⚠️
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL'; 
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- NAME SYSTEM ---
        let currentUser = localStorage.getItem('snakePlayerName');
        
        if (!currentUser) {
            document.getElementById('nameModal').style.display = 'flex';
        } else {
            document.getElementById('displayUsername').innerText = `Player: ${currentUser}`;
        }

        function saveName() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return document.getElementById('nameError').innerText = "Name cannot be empty!";
            
            currentUser = name;
            localStorage.setItem('snakePlayerName', name);
            document.getElementById('nameModal').style.display = 'none';
            document.getElementById('displayUsername').innerText = `Player: ${currentUser}`;
            restartGame({type: 'click'});
        }

        function changeName() {
            currentUser = null;
            document.getElementById('displayUsername').innerText = "Not playing";
            closeModal('settingsModal');
            document.getElementById('nameModal').style.display = 'flex';
            isPaused = true;
        }

        // --- GAME ENGINE (Smooth Movement, Strict Grid Rules) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const size = 20; // Grid block size
        let isPaused = true;
        let animationId;
        
        let score = 0;
        let difficulty = "easy";
        let speed = 4; // MUST divide smoothly into size (20). Easy = 4px/frame, Hard = 5px/frame
        
        let currentDir = 'RIGHT';
        let queuedDir = 'RIGHT';

        let snake = { x: 200, y: 200, vx: speed, vy: 0 };
        let pathHistory = []; 
        let snakeLength = 4;

        let food = {x: 0, y: 0};
        let mines = [];

        document.addEventListener("keydown", queueDirection);
        if (currentUser) requestAnimationFrame(gameLoop); // Auto-start rendering if logged in

        function gameLoop() {
            if (isPaused || !currentUser) return;

            updatePhysics();
            
            if (hasGameEnded()) {
                saveLeaderboard(score);
                drawGameOver();
                return;
            }

            renderGraphics();
            animationId = requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // SNAP TO GRID RULE: Only allow turns when snake is perfectly aligned to a 20x20 block
            if (snake.x % size === 0 && snake.y % size === 0) {
                currentDir = queuedDir;
                
                if (currentDir === 'RIGHT') { snake.vx = speed; snake.vy = 0; }
                else if (currentDir === 'LEFT') { snake.vx = -speed; snake.vy = 0; }
                else if (currentDir === 'UP') { snake.vx = 0; snake.vy = -speed; }
                else if (currentDir === 'DOWN') { snake.vx = 0; snake.vy = speed; }
            }

            // Move Head smoothly pixel-by-pixel
            snake.x += snake.vx;
            snake.y += snake.vy;

            // Save history for body to follow
            pathHistory.unshift({x: snake.x, y: snake.y});
            
            // Because speed varies, we calculate how many array items equal 1 grid block
            let spacing = size / speed; 
            
            if (pathHistory.length > snakeLength * spacing + 1) {
                pathHistory.pop();
            }

            // Grid-aligned Food Collision
            if (snake.x === food.x && snake.y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                snakeLength += 1;
                generateFood();
                if (difficulty === 'hard') generateMine();
            }
        }

        function renderGraphics() {
            ctx.fillStyle = '#1f2937';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Mines
            mines.forEach(mine => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0044';
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(mine.x + size/2, mine.y + size/2, size/2.2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = (Date.now() % 800 < 400) ? '#ff0044' : '#4a0011';
                ctx.beginPath();
                ctx.arc(mine.x + size/2, mine.y + size/2, size/4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0; 

            // Draw Food
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.arc(food.x + size/2, food.y + size/2, size/2.2, 0, Math.PI * 2);
            ctx.fill();

            // Draw Snake
            let spacing = size / speed; 
            for (let i = 0; i < snakeLength; i++) {
                let index = i * spacing;
                if (index >= pathHistory.length) break;
                
                let pos = pathHistory[index];
                let lightness = Math.max(30, 60 - (i * 2));
                
                ctx.fillStyle = `hsl(210, 80%, ${lightness}%)`;
                ctx.beginPath();
                ctx.arc(pos.x + size/2, pos.y + size/2, size/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- GAME LOGIC ---

        function generateFood() {
            let valid = false;
            while(!valid) {
                // Snap to 20x20 grid
                food.x = Math.floor(Math.random() * (canvas.width / size)) * size;
                food.y = Math.floor(Math.random() * (canvas.height / size)) * size;
                valid = true;
                mines.forEach(m => { if(m.x === food.x && m.y === food.y) valid = false; });
            }
        }

        function generateMine() {
            let mineX, mineY, valid = false;
            while(!valid) {
                mineX = Math.floor(Math.random() * (canvas.width / size)) * size;
                mineY = Math.floor(Math.random() * (canvas.height / size)) * size;
                valid = true;
                
                // Don't spawn on snake head
                if (Math.hypot(mineX - snake.x, mineY - snake.y) < size * 3) valid = false;
                if (mineX === food.x && mineY === food.y) valid = false;
            }
            mines.push({x: mineX, y: mineY});
        }

        function queueDirection(event) {
            if (!currentUser) return;
            const key = event.keyCode;
            
            // Queue the turn, but prevent 180-degree suicide turns based on current physical direction
            if ((key === 37 || key === 65) && currentDir !== 'RIGHT') queuedDir = 'LEFT';
            if ((key === 38 || key === 87) && currentDir !== 'DOWN') queuedDir = 'UP';
            if ((key === 39 || key === 68) && currentDir !== 'LEFT') queuedDir = 'RIGHT';
            if ((key === 40 || key === 83) && currentDir !== 'UP') queuedDir = 'DOWN';
        }

        function hasGameEnded() {
            // Wall Collision
            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) return true;
            
            // Mine Collision
            for (let m of mines) {
                if (snake.x === m.x && snake.y === m.y) return true;
            }
            
            // Self Collision (Only check against grid-aligned body segments)
            let spacing = size / speed;
            if (snake.x % size === 0 && snake.y % size === 0) {
                for (let i = 2; i < snakeLength; i++) {
                    let index = i * spacing;
                    if (index < pathHistory.length) {
                        if (snake.x === pathHistory[index].x && snake.y === pathHistory[index].y) return true;
                    }
                }
            }
            return false;
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = "16px Arial";
            ctx.fillText("Click to Restart", canvas.width / 2, canvas.height / 2 + 25);
            canvas.addEventListener('click', restartGame);
        }

        function restartGame(e) {
            if (!currentUser) return;
            canvas.removeEventListener('click', restartGame);
            cancelAnimationFrame(animationId);
            
            score = 0; scoreElement.innerHTML = score;
            speed = (difficulty === 'hard') ? 5 : 4;
            currentDir = 'RIGHT'; queuedDir = 'RIGHT';
            snake = { x: 200, y: 200, vx: speed, vy: 0 };
            pathHistory = [];
            snakeLength = 4;
            mines = [];
            generateFood();
            
            isPaused = false;
            requestAnimationFrame(gameLoop);
        }

        // --- UI & DATA LOGIC ---
        function openModal(id) { isPaused = true; document.getElementById(id).style.display = "flex"; if(id === 'leaderboardModal') loadLeaderboardUI(); }
        function closeModal(id) { document.getElementById(id).style.display = "none"; if(currentUser && !hasGameEnded()) { isPaused = false; requestAnimationFrame(gameLoop); } }

        function updateSettings() {
            difficulty = document.getElementById('difficultySelect').value;
            speed = (difficulty === 'hard') ? 5 : 4;
            if (snake.vx !== 0) snake.vx = (snake.vx > 0) ? speed : -speed;
            if (snake.vy !== 0) snake.vy = (snake.vy > 0) ? speed : -speed;
            if (difficulty === 'easy') mines = [];
        }

        // --- SUPABASE LEADERBOARD (HIGHEST SCORE ONLY) ---
        async function saveLeaderboard(currentScore) {
            if (currentScore === 0 || !currentUser) return;
            
            // 1. Check if user already exists in the database
            const { data: existingData, error: fetchError } = await supabase
                .from('global_leaderboard')
                .select('*')
                .eq('username', currentUser);

            if (fetchError) { console.error("Fetch Error:", fetchError); return; }

            if (existingData && existingData.length > 0) {
                // 2. If user exists, ONLY update if the new score is higher
                if (currentScore > existingData[0].score) {
                    await supabase
                        .from('global_leaderboard')
                        .update({ score: currentScore, mode: difficulty.toUpperCase() })
                        .eq('username', currentUser);
                }
            } else {
                // 3. New user, insert their first score
                await supabase
                    .from('global_leaderboard')
                    .insert([{ username: currentUser, score: currentScore, mode: difficulty.toUpperCase() }]);
            }
        }

        async function loadLeaderboardUI() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "<li>Loading...</li>"; 
            
            const { data: scores, error } = await supabase
                .from('global_leaderboard')
                .select('*')
                .order('score', { ascending: false }) 
                .limit(5); 

            if (error) return list.innerHTML = "<li>Failed to load leaderboard.</li>";

            list.innerHTML = "";
            if(scores.length === 0) return list.innerHTML = "<li>No scores yet!</li>";

            scores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<div class="rank-user"><strong>#${index + 1}</strong> <span>${entry.username}</span></div>
                                <div class="score-mode"><strong>${entry.score} pts</strong> <br><span style="font-size: 10px; color:#9ca3af;">${entry.mode}</span></div>`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
