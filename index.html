<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #111827;
            --canvas-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --modal-bg: rgba(17, 24, 39, 0.95);
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        .header { display: flex; justify-content: space-between; width: 95vw; max-width: 400px; margin-bottom: 10px; align-items: center; }
        .score-board { font-size: 18px; font-weight: bold; display: flex; align-items: center; }
        .user-info { font-size: 14px; color: #9ca3af; }
        
        .controls { display: flex; gap: 8px; }
        button { background-color: var(--btn-bg); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: var(--btn-hover); }

        canvas { 
            background-color: var(--canvas-bg); 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 95vw;
            max-width: 400px;
            height: 95vw;
            max-height: 400px;
            touch-action: none; 
        }

        .mobile-controls {
            display: none; 
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            margin-top: 20px;
        }

        .d-btn {
            background-color: var(--border-color);
            border-radius: 10px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: manipulation; 
        }
        .d-btn:active { background-color: var(--btn-hover); }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        @media (max-width: 768px) {
            .mobile-controls { display: grid; } 
        }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background-color: var(--modal-bg); padding: 30px; border-radius: 10px; width: 90%; max-width: 350px; border: 1px solid var(--border-color); }
        .modal h2 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; margin-bottom: 5px; color: #9ca3af;}
        .input-group input, select { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--canvas-bg); color: white; }
        
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 5px; min-height: 15px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .tab-btn.active { background-color: var(--btn-bg); border-color: var(--btn-bg); }

        .leaderboard-list { list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 14px;}
        .leaderboard-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .rank-user { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="user-info" id="displayUsername">Not playing</div>
            <div class="score-board">
                <span id="hpDisplay" style="display: inline-flex; gap: 4px; margin-right: 8px;"></span> 
                <span style="color: var(--border-color);">|</span> 
                <span style="margin-left: 8px;">Score: <span id="score">0</span></span>
            </div>
        </div>
        <div class="controls">
            <button onclick="openModal('settingsModal')">⚙️</button>
            <button onclick="openModal('leaderboardModal')">🏆</button>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="mobile-controls">
        <div class="d-btn" id="btn-up">⬆️</div>
        <div class="d-btn" id="btn-left">⬅️</div>
        <div class="d-btn" id="btn-right">➡️</div>
        <div class="d-btn" id="btn-down">⬇️</div>
    </div>

    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Welcome</h2>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="15">
            </div>
            <div id="nameError" class="error-msg"></div>
            <button style="width: 100%; margin-top: 10px;" onclick="saveName()">Start Playing</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Difficulty</label>
                <select id="difficultySelect" onchange="updateSettings()">
                    <option value="easy">Easy (Slower, No Mines)</option>
                    <option value="hard">Hard (Fast, Neon Mines!)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Snake Color</label>
                <select id="colorSelect" onchange="updateSettings()">
                    <option value="blue">Aqua Force (Blue to Cyan)</option>
                    <option value="fire">Dragon Fire (Red to Yellow)</option>
                    <option value="neon">Cyberpunk (Purple to Pink)</option>
                    <option value="toxic">Toxic Waste (Green to Lime)</option>
                    <option value="sunset">Miami Sunset (Orange to Pink)</option>
                    <option value="vapor">Vaporwave (Cyan to Purple)</option>
                    <option value="electric">Electric Surge (Yellow to Cyan)</option>
                    <option value="berry">Wild Berry (Pink to Purple)</option>
                </select>
            </div>
            <button style="width: 100%; margin-top: 10px;" onclick="closeModal('settingsModal')">Done</button>
            <button style="width: 100%; margin-top: 10px; background-color: #ef4444;" onclick="changeName()">Change Name</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <h2>Top 5 High Scores</h2>
            <div class="tabs">
                <button class="tab-btn active" id="tab-EASY" onclick="switchTab('EASY')">Easy</button>
                <button class="tab-btn" id="tab-HARD" onclick="switchTab('HARD')">Hard</button>
            </div>
            <ul id="leaderboardList" class="leaderboard-list"></ul>
            <button style="width: 100%;" onclick="closeModal('leaderboardModal')">Close</button>
        </div>
    </div>

    <script>
        // --- MINECRAFT PIXEL HEARTS ---
        const mcHeartFull = `<svg width="20" height="20" viewBox="0 0 10 10" style="image-rendering: pixelated;"><path d="M2,1h2v1h-2zM6,1h2v1h-2zM1,2h1v1h-1zM4,2h2v1h-2zM8,2h1v1h-1zM0,3h1v3h-1zM9,3h1v3h-1zM1,6h1v1h-1zM8,6h1v1h-1zM2,7h1v1h-1zM7,7h1v1h-1zM3,8h1v1h-1zM6,8h1v1h-1zM4,9h2v1h-2z" fill="#000"/><path d="M2,2h2v1h-2zM6,2h2v1h-2zM1,3h8v3h-8zM2,6h6v1h-6zM3,7h4v1h-4zM4,8h2v1h-2z" fill="#ff1111"/><path d="M2,2h1v1h-1zM1,3h1v1h-1z" fill="#fff"/></svg>`;
        const mcHeartEmpty = `<svg width="20" height="20" viewBox="0 0 10 10" style="image-rendering: pixelated;"><path d="M2,1h2v1h-2zM6,1h2v1h-2zM1,2h1v1h-1zM4,2h2v1h-2zM8,2h1v1h-1zM0,3h1v3h-1zM9,3h1v3h-1zM1,6h1v1h-1zM8,6h1v1h-1zM2,7h1v1h-1zM7,7h1v1h-1zM3,8h1v1h-1zM6,8h1v1h-1zM4,9h2v1h-2z" fill="#000"/><path d="M2,2h2v1h-2zM6,2h2v1h-2zM1,3h8v3h-8zM2,6h6v1h-6zM3,7h4v1h-4zM4,8h2v1h-2z" fill="#2b2b2b"/><path d="M2,2h1v1h-1zM1,3h1v1h-1z" fill="#444"/></svg>`;

        function updateHPDisplay() {
            const hpDisplay = document.getElementById("hpDisplay");
            if (hp === 2) hpDisplay.innerHTML = mcHeartFull + mcHeartFull;
            else if (hp === 1) hpDisplay.innerHTML = mcHeartFull + mcHeartEmpty;
            else hpDisplay.innerHTML = mcHeartEmpty + mcHeartEmpty;
        }

        // --- NAME SYSTEM ---
        let currentUser = localStorage.getItem('snakePlayerName');
        if (!currentUser) document.getElementById('nameModal').style.display = 'flex';
        else document.getElementById('displayUsername').innerText = `Player: ${currentUser}`;

        function saveName() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return document.getElementById('nameError').innerText = "Name cannot be empty!";
            currentUser = name;
            localStorage.setItem('snakePlayerName', name);
            document.getElementById('nameModal').style.display = 'none';
            document.getElementById('displayUsername').innerText = `Player: ${currentUser}`;
            restartGame();
        }

        function changeName() {
            currentUser = null;
            document.getElementById('displayUsername').innerText = "Not playing";
            closeModal('settingsModal');
            document.getElementById('nameModal').style.display = 'flex';
            gameState = 'PAUSED';
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const size = 20; 
        let animationId;
        
        let gameState = 'WAITING'; // WAITING, PLAYING, DEAD, PAUSED
        let score = 0;
        let hp = 2;
        let difficulty = "easy";
        let activeColorKey = "blue";
        let speed = 2; 
        
        let currentDir = 'RIGHT';
        let queuedDir = 'RIGHT';

        let snake = { x: 200, y: 200, vx: 0, vy: 0 };
        let pathHistory = []; 
        let snakeLength = 4;

        let food = {x: 0, y: 0};
        let mines = [];
        let particles = [];

        // Animation Timers
        let dizzyTimer = 0;
        let invulnTimer = 0;
        let deathTimer = 0;

        const colorThemes = {
            blue: { h1: 220, h2: 180, s: '100%', l: '60%' },
            fire: { h1: 0, h2: 60, s: '100%', l: '55%' },
            neon: { h1: 280, h2: 330, s: '100%', l: '60%' },
            toxic: { h1: 130, h2: 70, s: '100%', l: '50%' },
            sunset: { h1: 25, h2: 320, s: '100%', l: '60%' },
            vapor: { h1: 180, h2: 280, s: '100%', l: '65%' },
            electric: { h1: 60, h2: 180, s: '100%', l: '55%' },
            berry: { h1: 340, h2: 270, s: '100%', l: '60%' }
        };

        // --- CONTROLS LOGIC ---
        function setDirection(newDir) {
            if (!currentUser || gameState === 'DEAD' || gameState === 'PAUSED') return;
            
            if (gameState === 'WAITING') {
                gameState = 'PLAYING';
                currentDir = newDir; queuedDir = newDir;
                if (newDir === 'RIGHT') snake.vx = speed;
                if (newDir === 'LEFT') snake.vx = -speed;
                if (newDir === 'UP') snake.vy = -speed;
                if (newDir === 'DOWN') snake.vy = speed;
                return;
            }

            if (newDir === 'LEFT' && currentDir !== 'RIGHT') queuedDir = 'LEFT';
            if (newDir === 'UP' && currentDir !== 'DOWN') queuedDir = 'UP';
            if (newDir === 'RIGHT' && currentDir !== 'LEFT') queuedDir = 'RIGHT';
            if (newDir === 'DOWN' && currentDir !== 'UP') queuedDir = 'DOWN';
        }

        document.addEventListener("keydown", (e) => {
            const key = e.keyCode;
            if (key === 37 || key === 65) setDirection('LEFT');
            if (key === 38 || key === 87) setDirection('UP');
            if (key === 39 || key === 68) setDirection('RIGHT');
            if (key === 40 || key === 83) setDirection('DOWN');
        });

        const setupMobileBtn = (id, dir) => {
            const btn = document.getElementById(id);
            const handler = (e) => { e.preventDefault(); setDirection(dir); };
            btn.addEventListener('touchstart', handler, {passive: false});
            btn.addEventListener('mousedown', handler);
        };
        setupMobileBtn('btn-up', 'UP'); setupMobileBtn('btn-left', 'LEFT');
        setupMobileBtn('btn-right', 'RIGHT'); setupMobileBtn('btn-down', 'DOWN');

        // --- GAME LOOP ---
        function gameLoop() {
            if (!currentUser || gameState === 'PAUSED') return;

            if (gameState === 'PLAYING') {
                updatePhysics();
                updateParticles(1.0);
                if (dizzyTimer > 0) dizzyTimer--;
                if (invulnTimer > 0) invulnTimer--;
            } else if (gameState === 'DEAD') {
                updateParticles(0.2); 
                deathTimer++;
                if (deathTimer === 150) {
                    canvas.addEventListener('click', handleRestartClick);
                }
            }

            renderGraphics();
            animationId = requestAnimationFrame(gameLoop);
        }

        function takeDamage() {
            if (invulnTimer > 0) return; 
            
            hp--;
            updateHPDisplay();

            if (hp <= 0) {
                gameState = 'DEAD';
                deathTimer = 0;
                saveLeaderboard(score);
            } else {
                dizzyTimer = 180; 
                invulnTimer = 60; 
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<30; i++) {
                let angle = Math.random() * Math.PI * 2;
                let force = Math.random() * 5 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * force,
                    vy: Math.sin(angle) * force,
                    life: 1.0,
                    color: color
                });
            }
        }

        function updateParticles(timeScale) {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.life -= 0.03 * timeScale;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function updatePhysics() {
            if (snake.x % size === 0 && snake.y % size === 0) {
                currentDir = queuedDir;
                if (currentDir === 'RIGHT') { snake.vx = speed; snake.vy = 0; }
                else if (currentDir === 'LEFT') { snake.vx = -speed; snake.vy = 0; }
                else if (currentDir === 'UP') { snake.vx = 0; snake.vy = -speed; }
                else if (currentDir === 'DOWN') { snake.vx = 0; snake.vy = speed; }
            }

            let nextX = snake.x + snake.vx;
            let nextY = snake.y + snake.vy;

            // 1. Wall Collision (Bounce back)
            if (nextX < 0 || nextX > canvas.width - size || nextY < 0 || nextY > canvas.height - size) {
                takeDamage();
                if (hp > 0) {
                    if (snake.vx > 0) { currentDir = 'LEFT'; queuedDir = 'LEFT'; snake.vx = -speed; }
                    else if (snake.vx < 0) { currentDir = 'RIGHT'; queuedDir = 'RIGHT'; snake.vx = speed; }
                    else if (snake.vy > 0) { currentDir = 'UP'; queuedDir = 'UP'; snake.vy = -speed; }
                    else if (snake.vy < 0) { currentDir = 'DOWN'; queuedDir = 'DOWN'; snake.vy = speed; }
                    return; 
                } else {
                    snake.vx = 0; snake.vy = 0;
                }
            } else {
                snake.x = nextX;
                snake.y = nextY;
            }

            pathHistory.unshift({x: snake.x, y: snake.y});
            let spacing = size / speed; 
            if (pathHistory.length > snakeLength * spacing + 1) pathHistory.pop();

            // 2. Body Collision
            if (snake.x % size === 0 && snake.y % size === 0 && invulnTimer <= 0) {
                for (let i = 2; i < snakeLength; i++) {
                    let index = i * spacing;
                    if (index < pathHistory.length && snake.x === pathHistory[index].x && snake.y === pathHistory[index].y) {
                        takeDamage();
                        break;
                    }
                }
            }

            // 3. Apple Collision
            if (snake.x === food.x && snake.y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                snakeLength += 1;
                generateFood();
                if (difficulty === 'hard') generateMine();
            }

            // 4. Mine Collision
            let cx = snake.x + size/2;
            let cy = snake.y + size/2;
            let hitMineIndex = mines.findIndex(m => Math.hypot((m.x + size/2) - cx, (m.y + size/2) - cy) < size * 0.8);
            
            if (hitMineIndex !== -1) {
                createExplosion(mines[hitMineIndex].x + size/2, mines[hitMineIndex].y + size/2, '#ff0044');
                mines.splice(hitMineIndex, 1);
                takeDamage();
            }
        }

        function renderGraphics() {
            ctx.fillStyle = '#1f2937';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Mines
            mines.forEach(mine => {
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff0044';
                ctx.fillStyle = '#000000';
                ctx.beginPath(); ctx.arc(mine.x + size/2, mine.y + size/2, size/2.2, 0, Math.PI * 2); ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = (Date.now() % 800 < 400) ? '#ff0044' : '#4a0011';
                ctx.beginPath(); ctx.arc(mine.x + size/2, mine.y + size/2, size/4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.shadowBlur = 0; 

            // Food
            ctx.fillStyle = '#10b981';
            ctx.beginPath(); ctx.arc(food.x + size/2, food.y + size/2, size/2.2, 0, Math.PI * 2); ctx.fill();

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            // Snake
            let spacing = size / speed; 
            let theme = colorThemes[activeColorKey];
            
            // Flash if invulnerable
            if (invulnTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.4;

            for (let i = snakeLength - 1; i >= 0; i--) {
                let index = i * spacing;
                if (index >= pathHistory.length) continue;
                let pos = pathHistory[index];
                
                let ratio = i / snakeLength;
                let currentHue = theme.h1 + (theme.h2 - theme.h1) * ratio;
                
                ctx.fillStyle = `hsl(${currentHue}, ${theme.s}, ${theme.l})`;
                ctx.beginPath(); ctx.arc(pos.x + size/2, pos.y + size/2, size/2, 0, Math.PI * 2); ctx.fill();

                // Head & Eyes
                if (i === 0) {
                    ctx.fillStyle = '#000000';
                    let d = 4.5; let ex1, ey1, ex2, ey2;
                    if (currentDir === 'RIGHT') { ex1 = d; ey1 = -d; ex2 = d; ey2 = d; }
                    else if (currentDir === 'LEFT') { ex1 = -d; ey1 = -d; ex2 = -d; ey2 = d; }
                    else if (currentDir === 'UP') { ex1 = -d; ey1 = -d; ex2 = d; ey2 = -d; }
                    else if (currentDir === 'DOWN') { ex1 = -d; ey1 = d; ex2 = d; ey2 = d; }

                    ctx.beginPath(); ctx.arc(pos.x + size/2 + ex1, pos.y + size/2 + ey1, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(pos.x + size/2 + ex2, pos.y + size/2 + ey2, 2.5, 0, Math.PI*2); ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;

            // Dizzy Stars
            if (dizzyTimer > 0 && gameState !== 'DEAD') {
                ctx.fillStyle = '#fbbf24';
                for (let i=0; i<3; i++) {
                    let angle = (Date.now() / 200) + (i * Math.PI * 2 / 3);
                    let sx = snake.x + size/2 + Math.cos(angle) * 12;
                    let sy = snake.y - 4 + Math.sin(angle) * 6;
                    ctx.fillRect(sx, sy, 4, 4);
                }
            }

            // UI Overlays
            if (gameState === 'WAITING') {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(Date.now() / 200) * 0.5})`;
                ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
                ctx.fillText("Press W A S D or Arrows to Start", canvas.width / 2, canvas.height / 2 + 50);
            }

            if (gameState === 'DEAD') {
                ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.6, deathTimer * 0.01)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = `rgba(220, 20, 20, ${Math.min(1, deathTimer * 0.02)})`;
                ctx.font = `900 ${Math.min(55, 30 + deathTimer * 0.3)}px "Arial Black", Impact, sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("WASTED", canvas.width/2, canvas.height/2);
                
                if (deathTimer > 150) {
                    ctx.font = "16px Arial"; ctx.fillStyle = "white";
                    ctx.fillText("Tap or Click to Restart", canvas.width/2, canvas.height/2 + 50);
                }
            }
        }

        // --- ENTITY GENERATION ---
        function generateFood() {
            let valid = false;
            while(!valid) {
                food.x = Math.floor(Math.random() * (canvas.width / size)) * size;
                food.y = Math.floor(Math.random() * (canvas.height / size)) * size;
                valid = true;
                mines.forEach(m => { if(m.x === food.x && m.y === food.y) valid = false; });
            }
        }

        function generateMine() {
            let mineX, mineY, valid = false;
            while(!valid) {
                mineX = Math.floor(Math.random() * (canvas.width / size)) * size;
                mineY = Math.floor(Math.random() * (canvas.height / size)) * size;
                valid = true;
                if (Math.hypot(mineX - snake.x, mineY - snake.y) < size * 3) valid = false;
                if (mineX === food.x && mineY === food.y) valid = false;
            }
            mines.push({x: mineX, y: mineY});
        }

        // --- CORE RESETS ---
        function handleRestartClick() {
            canvas.removeEventListener('click', handleRestartClick);
            restartGame();
        }

        function restartGame() {
            if (!currentUser) return;
            cancelAnimationFrame(animationId);
            
            gameState = 'WAITING';
            score = 0; scoreElement.innerHTML = score;
            hp = 2; updateHPDisplay();
            
            speed = (difficulty === 'hard') ? 4 : 2; 
            currentDir = 'RIGHT'; queuedDir = 'RIGHT';
            snake = { x: 200, y: 200, vx: 0, vy: 0 };
            
            pathHistory = [{x:200, y:200}]; 
            snakeLength = 4;
            mines = [];
            particles = [];
            
            dizzyTimer = 0; invulnTimer = 0; deathTimer = 0;

            generateFood();
            requestAnimationFrame(gameLoop);
        }

        // --- UI MENUS ---
        let currentLeaderboardTab = 'EASY';

        function openModal(id) { 
            gameState = 'PAUSED'; 
            document.getElementById(id).style.display = "flex"; 
            if(id === 'leaderboardModal') switchTab(difficulty.toUpperCase()); 
        }
        
        function closeModal(id) { 
            document.getElementById(id).style.display = "none"; 
            if(currentUser && hp > 0) { 
                gameState = (snake.vx === 0 && snake.vy === 0) ? 'WAITING' : 'PLAYING';
                requestAnimationFrame(gameLoop); 
            } 
        }

        function updateSettings() {
            difficulty = document.getElementById('difficultySelect').value;
            activeColorKey = document.getElementById('colorSelect').value;
            
            speed = (difficulty === 'hard') ? 4 : 2;
            if (snake.vx !== 0) snake.vx = (snake.vx > 0) ? speed : -speed;
            if (snake.vy !== 0) snake.vy = (snake.vy > 0) ? speed : -speed;
            if (difficulty === 'easy') mines = [];
            
            if(gameState === 'PAUSED' && pathHistory.length > 0) renderGraphics(); 
        }

        function switchTab(mode) {
            currentLeaderboardTab = mode;
            document.getElementById('tab-EASY').classList.toggle('active', mode === 'EASY');
            document.getElementById('tab-HARD').classList.toggle('active', mode === 'HARD');
            loadLeaderboardUI();
        }

        function saveLeaderboard(currentScore) {
            if (currentScore === 0 || !currentUser) return;
            let scores = JSON.parse(localStorage.getItem('snakeLocalScores')) || [];
            let currentMode = difficulty.toUpperCase();
            let existingPlayerIndex = scores.findIndex(entry => entry.username === currentUser && entry.mode === currentMode);
            
            if (existingPlayerIndex !== -1) {
                if (currentScore > scores[existingPlayerIndex].score) scores[existingPlayerIndex].score = currentScore;
            } else {
                scores.push({ username: currentUser, score: currentScore, mode: currentMode });
            }
            
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('snakeLocalScores', JSON.stringify(scores));
        }

        function loadLeaderboardUI() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = ""; 
            let scores = JSON.parse(localStorage.getItem('snakeLocalScores')) || [];
            let filteredScores = scores.filter(entry => entry.mode === currentLeaderboardTab);
            let top5 = filteredScores.slice(0, 5);
            
            if(top5.length === 0) return list.innerHTML = `<li>No ${currentLeaderboardTab.toLowerCase()} scores yet!</li>`;

            top5.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<div class="rank-user"><strong>#${index + 1}</strong> <span>${entry.username}</span></div>
                                <div><strong>${entry.score} pts</strong></div>`;
                list.appendChild(li);
            });
        }

        // --- STARTUP LOGIC ---
        if (currentUser) restartGame();
        else { generateFood(); updateHPDisplay(); renderGraphics(); }
    </script>
</body>
</html>
